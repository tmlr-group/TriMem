<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" width="560" height="220">
  <defs>
    <!-- Background subtle gradient -->
    <radialGradient id="bgGlow" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%"  stop-color="#F3EEFF" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#FAF7FF" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Aurora wordmark gradient: indigo -> violet -> pink -->
    <linearGradient id="wordGrad" x1="0" y1="0" x2="1" y2="0.35">
      <stop offset="0%"   stop-color="#4F46E5"/>
      <stop offset="40%"  stop-color="#7C3AED"/>
      <stop offset="75%"  stop-color="#D946EF"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>

    <!-- Mem gradient: cyan -> teal (cool, fresh contrast) -->
    <linearGradient id="memGrad" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%"   stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>

    <!-- Network dot pattern -->
    <pattern id="dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="#A99FCE" opacity="0.18"/>
    </pattern>

    <!-- Soft shadow filter -->
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle aura glow behind the wordmark -->
    <filter id="auraGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- background wash -->
  <rect width="560" height="220" fill="url(#bgGlow)"/>
  <rect width="560" height="220" fill="url(#dots)"/>

  <!-- soft aura behind wordmark -->
  <g transform="translate(280, 110)" filter="url(#auraGlow)" opacity="0.32">
    <ellipse cx="-90" cy="20" rx="70" ry="34" fill="#7C3AED"/>
    <ellipse cx="20"  cy="20" rx="80" ry="34" fill="#EC4899"/>
    <ellipse cx="120" cy="20" rx="60" ry="30" fill="#06B6D4"/>
  </g>

  <!-- ============== WORDMARK (centered) ============== -->
  <g transform="translate(280, 110)" filter="url(#softShadow)">
    <text x="0" y="20" text-anchor="middle"
          font-family="Inter, 'Segoe UI', Arial, sans-serif"
          font-size="92" font-weight="800" fill="url(#wordGrad)"
          letter-spacing="-3">
      Tri<tspan font-weight="500" fill="url(#memGrad)">Mem</tspan>
    </text>

    <!-- accent underline (mirrors the brand palette) -->
    <g transform="translate(-58, 38)">
      <rect x="0"   y="0" width="40" height="4" rx="2" fill="#4F46E5" opacity="0.95"/>
      <rect x="44"  y="0" width="34" height="4" rx="2" fill="#7C3AED" opacity="0.95"/>
      <rect x="82"  y="0" width="20" height="4" rx="2" fill="#EC4899" opacity="0.95"/>
      <rect x="106" y="0" width="12" height="4" rx="2" fill="#06B6D4" opacity="0.95"/>
    </g>

    <text x="0" y="72" text-anchor="middle"
          font-family="Inter, 'Segoe UI', Arial, sans-serif"
          font-size="13" font-weight="600" fill="#4A4670" letter-spacing="3.4">
      THREE-TIER MEMORY · DIALOGUES · FACTS · PROFILES
    </text>
  </g>
</svg>
